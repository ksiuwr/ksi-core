services:
  traefik:
    image: traefik:v3
    container_name: traefik-prod
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - ksi-network
    ports:
      - "80:80"
      - "443:443"
    environment:
      - TZ=Europe/Warsaw
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
    command:
      # Provider Settings
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      # Entrypoints & HTTP to HTTPS Redirection
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      # SSL / Let's Encrypt
      - "--certificatesresolvers.letsencrypt.acme.email=admin@ksi.ii.uni.wroc.pl"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    labels:
      - "traefik.enable=true"
      # Secure Traefik Dashboard (Optional - replace with your credentials)
      - "traefik.http.routers.dashboard.rule=Host(`ksi.ii.uni.wroc.pl`) && PathPrefix(`/traefik`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"

  postgres:
    image: postgres:13-alpine
    container_name: ksi-postgres-prod
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ksi-network

  backend:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    container_name: ksi-backend-prod
    restart: unless-stopped
    env_file:
      - ../.env
    networks:
      - ksi-network
    depends_on:
      - postgres
    labels:
      - "traefik.enable=true"
      # Routing Logic
      - "traefik.http.routers.backend.rule=Host(`ksi.ii.uni.wroc.pl`) && PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.backend.priority=10"
      # Middleware: Strip /api and add compression
      - "traefik.http.middlewares.api-strip.stripprefix.prefixes=/api"
      - "traefik.http.routers.backend.middlewares=api-strip,gzip-compress"
      - "traefik.http.services.backend.loadbalancer.server.port=3000"

  frontend:
    build:
      context: ..
      dockerfile: apps/frontend/Dockerfile
    container_name: ksi-frontend-prod
    restart: unless-stopped
    networks:
      - ksi-network
    labels:
      - "traefik.enable=true"
      # Routing Logic
      - "traefik.http.routers.frontend.rule=Host(`ksi.ii.uni.wroc.pl`) && PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=3001
      # Middleware: Gzip Compression
      - "traefik.http.middlewares.gzip-compress.compress=true"
      - "traefik.http.routers.frontend.middlewares=gzip-compress"

networks:
  ksi-network:
    driver: bridge

volumes:
  postgres-data:
